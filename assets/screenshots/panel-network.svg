<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Network and entry route screenshot</title>
  <desc id="desc">Public UNMC-style sample screenshot of the network page showing the Beijing relay, Los Angeles accelerator, Mac mini target and latency chart.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fbff"/><stop offset="1" stop-color="#e9f2f8"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity=".88"/><stop offset="1" stop-color="#ffffff" stop-opacity=".45"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0f172a" flood-opacity=".12"/></filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 10 5 0 10z" fill="#0a66ff"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 10 5 0 10z" fill="#e2552d"/></marker>
    <style>
      .bg{fill:url(#bg)} .bar{fill:rgba(255,255,255,.76)} .card{fill:url(#glass);stroke:rgba(255,255,255,.84);filter:url(#shadow)} .soft{fill:rgba(255,255,255,.60);stroke:rgba(15,23,42,.08)}
      .ink{fill:#0a0d14;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.muted{fill:#667085;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .h1{font-size:44px;font-weight:850}.h2{font-size:25px;font-weight:820}.small{font-size:16px}.tiny{font-size:13px}.label{font-size:14px;font-weight:760}.value{font-size:28px;font-weight:850}
      .teal{fill:#009f8f}.blue{fill:#0a66ff}.orange{fill:#e2552d}.rail{stroke:#0a66ff;stroke-width:3;fill:none;marker-end:url(#arrow-blue)}.la-rail{stroke:#e2552d;stroke-width:3;fill:none;marker-end:url(#arrow-orange)}
      .back{stroke:#58c7bd;stroke-width:2;fill:none;stroke-dasharray:7 8}.grid{stroke:#d9e1e8}.chart-la{stroke:#e2552d;stroke-width:4;fill:none}.chart-bj{stroke:#0a66ff;stroke-width:4;fill:none}.chart-local{stroke:#009f8f;stroke-width:4;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760" rx="26"/>
  <rect class="bar" width="1280" height="78"/>
  <text class="ink h2" x="42" y="49">Network · entry routes</text>
  <text class="muted small" x="1000" y="49">UNMC reference</text>

  <rect class="card" x="88" y="115" width="1090" height="300" rx="28"/>
  <text class="ink h1" x="126" y="173">Beijing relay + Los Angeles accelerator</text>
  <text class="muted small" x="128" y="204">The LA entry forwards to Beijing first; the world still lives on the Mac mini behind the SSH tunnel.</text>

  <g transform="translate(128 252)">
    <rect class="soft" width="210" height="82" rx="20"/>
    <text class="ink label" x="105" y="30" text-anchor="middle">LA accelerator</text>
    <text class="muted tiny" x="105" y="52" text-anchor="middle">la.playje.unmcserver.com</text>
    <text class="orange value" x="105" y="76" text-anchor="middle">91 ms</text>
  </g>
  <path class="la-rail" d="M354 294H500"/>
  <g transform="translate(520 252)">
    <rect class="soft" width="210" height="82" rx="20"/>
    <text class="ink label" x="105" y="30" text-anchor="middle">Beijing relay</text>
    <text class="muted tiny" x="105" y="52" text-anchor="middle">playje.unmcserver.com</text>
    <text class="blue value" x="105" y="76" text-anchor="middle">28 ms</text>
  </g>
  <path class="rail" d="M746 294H892"/><path class="back" d="M892 310H746"/>
  <g transform="translate(912 252)">
    <rect class="soft" width="210" height="82" rx="20"/>
    <text class="ink label" x="105" y="30" text-anchor="middle">Mac mini / JE</text>
    <text class="muted tiny" x="105" y="52" text-anchor="middle">SSH reverse tunnel target</text>
    <text class="teal value" x="105" y="76" text-anchor="middle">1 ms</text>
  </g>

  <text class="muted tiny" x="128" y="368">Probe: Minecraft Server List Ping. Values are route measurements from the panel machine, not player FPS or game tick time.</text>

  <rect class="card" x="88" y="452" width="520" height="230" rx="26"/>
  <text class="ink h2" x="126" y="502">Route summary</text>
  <text class="muted small" x="126" y="532">Public entries answering</text>
  <text class="ink value" x="126" y="587">2 / 2</text>
  <text class="muted tiny" x="126" y="615">Beijing is the main relay.</text>
  <text class="muted tiny" x="126" y="635">LA is not a second world.</text>
  <text class="muted small" x="342" y="532">LA purpose</text>
  <text class="orange value" x="342" y="587">routing</text>
  <text class="muted tiny" x="342" y="615">Useful when overseas paths</text>
  <text class="muted tiny" x="342" y="635">prefer Los Angeles.</text>

  <rect class="card" x="650" y="452" width="528" height="230" rx="26"/>
  <text class="ink h2" x="686" y="502">Latency trend</text>
  <g transform="translate(700 535)">
    <line class="grid" x1="0" y1="0" x2="420" y2="0"/><line class="grid" x1="0" y1="50" x2="420" y2="50"/><line class="grid" x1="0" y1="100" x2="420" y2="100"/>
    <polyline class="chart-la" points="0,58 45,74 90,44 135,56 180,36 225,48 270,42 315,44 360,32 420,40"/>
    <polyline class="chart-bj" points="0,88 45,86 90,84 135,82 180,84 225,80 270,82 315,78 360,76 420,74"/>
    <polyline class="chart-local" points="0,98 45,97 90,98 135,96 180,97 225,96 270,98 315,97 360,96 420,97"/>
  </g>
  <text class="muted tiny" x="700" y="666">Orange: LA route. Blue: Beijing route. Green: local Mac mini response.</text>
</svg>
