<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Settings and backup screenshot</title>
  <desc id="desc">Sanitized demo screenshot of plugin toggles, server.properties editing and local backup schedule.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fbff"/><stop offset="1" stop-color="#e9f2f8"/></linearGradient><linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".9"/><stop offset="1" stop-color="#fff" stop-opacity=".45"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0f172a" flood-opacity=".12"/></filter><style>.bg{fill:url(#bg)}.bar{fill:rgba(255,255,255,.76)}.card{fill:url(#glass);stroke:rgba(255,255,255,.84);filter:url(#shadow)}.soft{fill:rgba(255,255,255,.62);stroke:rgba(15,23,42,.08)}.ink{fill:#0a0d14;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.muted{fill:#667085;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.h2{font-size:25px;font-weight:820}.small{font-size:16px}.tiny{font-size:13px}.label{font-size:14px;font-weight:760}.value{font-size:30px;font-weight:850}.teal{fill:#009f8f}.blue{fill:#0a66ff}.orange{fill:#e2552d}.pill{fill:#e8fff9;stroke:#7bd7cc}.switch{fill:#009f8f}.track{fill:#dbe4ec}.btn{fill:#fff;stroke:rgba(15,23,42,.12)}</style></defs>
  <rect class="bg" width="1280" height="760" rx="26"/><rect class="bar" width="1280" height="78"/><text class="ink h2" x="42" y="49">Settings · plugins and backups</text><text class="muted small" x="1000" y="49">UNMC public sample</text>
  <rect class="card" x="80" y="118" width="1120" height="95" rx="26"/><text class="ink h2" x="112" y="162">Restart guide</text><text class="muted small" x="112" y="188">Changed properties and plugin toggles are written to disk, then applied after a JE restart.</text><rect class="pill" x="845" y="145" width="290" height="38" rx="19"/><text class="teal label" x="890" y="169">No pending restart</text>
  <rect class="card" x="80" y="245" width="350" height="395" rx="26"/><text class="ink h2" x="112" y="295">Current rules</text>
  <text class="muted tiny" x="112" y="340">Port</text><text class="ink value" x="112" y="370">25565</text>
  <text class="muted tiny" x="250" y="340">Difficulty</text><text class="ink value" x="250" y="370">hard</text>
  <text class="muted tiny" x="112" y="430">Gamemode</text><text class="ink value" x="112" y="460">survival</text>
  <text class="muted tiny" x="250" y="430">Max players</text><text class="ink value" x="250" y="460">20</text>
  <text class="muted tiny" x="112" y="520">Online mode</text><text class="ink value" x="112" y="550">true</text>
  <text class="muted tiny" x="250" y="520">PVP</text><text class="ink value" x="250" y="550">true</text>
  <rect class="card" x="465" y="245" width="350" height="395" rx="26"/><text class="ink h2" x="497" y="295">Plugins</text><text class="muted small" x="497" y="320">Toggle requires JE restart</text>
  <text class="ink label" x="497" y="374">WorldEdit.jar</text><rect class="track" x="706" y="352" width="58" height="30" rx="15"/><circle class="switch" cx="749" cy="367" r="12"/>
  <text class="ink label" x="497" y="444">EssentialsX.jar</text><rect class="track" x="706" y="422" width="58" height="30" rx="15"/><circle class="switch" cx="749" cy="437" r="12"/>
  <text class="ink label" x="497" y="514">Spark.jar</text><rect class="track" x="706" y="492" width="58" height="30" rx="15"/><circle class="switch" cx="749" cy="507" r="12"/>
  <text class="muted tiny" x="497" y="586">3 / 3 enabled · sample plugin names</text>
  <rect class="card" x="850" y="245" width="350" height="395" rx="26"/><text class="ink h2" x="882" y="295">Local backups</text>
  <text class="muted tiny" x="882" y="340">Schedule</text><text class="ink value" x="882" y="370">Daily 08:00</text>
  <text class="muted tiny" x="882" y="425">Retention</text><text class="ink value" x="882" y="455">7 copies</text>
  <text class="muted tiny" x="882" y="510">Location</text><text class="ink label" x="882" y="540">backups/world</text>
  <rect class="btn" x="882" y="575" width="130" height="42" rx="14"/><text class="ink label" x="908" y="601">Backup now</text>
  <rect class="btn" x="1030" y="575" width="118" height="42" rx="14"/><text class="ink label" x="1060" y="601">Save</text>
</svg>
