<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Terminal screenshot</title>
  <desc id="desc">Sanitized demo screenshot of the terminal page with logs, quick actions and command input.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f9fbff"/><stop offset="1" stop-color="#e9f2f8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0f172a" flood-opacity=".12"/></filter><style>.bg{fill:url(#bg)}.bar{fill:rgba(255,255,255,.76)}.card{fill:rgba(255,255,255,.74);stroke:rgba(255,255,255,.84);filter:url(#shadow)}.ink{fill:#0a0d14;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.muted{fill:#667085;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.h2{font-size:25px;font-weight:820}.small{font-size:16px}.label{font-size:14px;font-weight:760}.terminal{fill:#07130d}.termtext{fill:#d6f5de;font:16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.btn{fill:#fff;stroke:rgba(15,23,42,.12)}.danger{fill:#fff6f4;stroke:#f0aaa0}.input{fill:#fff;stroke:rgba(15,23,42,.12)}</style></defs>
  <rect class="bg" width="1280" height="760" rx="26"/><rect class="bar" width="1280" height="78"/><text class="ink h2" x="42" y="49">Terminal · logs and commands</text><text class="muted small" x="1010" y="49">sanitized demo</text>
  <rect class="card" x="80" y="118" width="1120" height="470" rx="26"/><text class="ink h2" x="112" y="168">Server log</text><text class="muted small" x="1010" y="168">JE / Tunnel</text>
  <rect class="terminal" x="112" y="195" width="1056" height="350" rx="16"/>
  <text class="termtext" x="142" y="235">[12:00:01] [Server thread/INFO]: Starting Minecraft server on *:25565</text>
  <text class="termtext" x="142" y="270">[12:00:08] [Server thread/INFO]: Done (7.42s)! For help, type "help"</text>
  <text class="termtext" x="142" y="305">[12:04:19] [Server thread/INFO]: DemoPlayer_A joined the game</text>
  <text class="termtext" x="142" y="340">[12:10:42] [Server thread/INFO]: There are 3 of a max of 20 players online</text>
  <text class="termtext" x="142" y="375">[12:18:00] [Server thread/INFO]: Saved the game</text>
  <text class="termtext" x="142" y="410">[12:20:14] [Tunnel/INFO]: reverse tunnel connected to primary relay</text>
  <text class="termtext" x="142" y="445">[12:23:55] [Panel/INFO]: command sent: list</text>
  <text class="termtext" x="142" y="480">[12:24:02] [Backup/INFO]: next automatic backup at 08:00</text>
  <rect class="card" x="80" y="615" width="1120" height="90" rx="24"/>
  <rect class="btn" x="112" y="642" width="118" height="38" rx="12"/><text class="ink label" x="137" y="666">Start all</text>
  <rect class="btn" x="246" y="642" width="118" height="38" rx="12"/><text class="ink label" x="267" y="666">Restart JE</text>
  <rect class="btn" x="380" y="642" width="132" height="38" rx="12"/><text class="ink label" x="400" y="666">Restart tunnel</text>
  <rect class="btn" x="528" y="642" width="118" height="38" rx="12"/><text class="ink label" x="550" y="666">Save world</text>
  <rect class="danger" x="662" y="642" width="92" height="38" rx="12"/><text class="ink label" x="684" y="666">Stop JE</text>
  <rect class="input" x="780" y="642" width="300" height="38" rx="12"/><text class="muted label" x="800" y="666">Minecraft console command</text>
  <rect class="btn" x="1094" y="642" width="74" height="38" rx="12"/><text class="ink label" x="1116" y="666">Send</text>
</svg>
