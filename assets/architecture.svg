<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">UN-Minecraft-JE-Server-Gateway architecture</title>
  <desc id="desc">UNMC public Java Edition architecture: players connect through the Beijing entry or Los Angeles accelerator; both routes reach the Beijing relay, then an SSH reverse tunnel forwards traffic to a Mac mini running Minecraft, the local panel and backups.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#f0883e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#010409" flood-opacity=".35"/>
    </filter>
    <style>
      .bg { fill: #0d1117; }
      .card { fill: #161b22; stroke: #30363d; stroke-width: 1.4; filter: url(#shadow); }
      .bj { fill: #142238; stroke: #58a6ff; }
      .la { fill: #241a10; stroke: #f0883e; }
      .mac { fill: #102a25; stroke: #3fb950; }
      .title { fill: #e6edf3; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #e6edf3; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #8b949e; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #8b949e; font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { fill: none; stroke: #58a6ff; stroke-width: 2; marker-end: url(#arrow-blue); }
      .la-line { fill: none; stroke: #f0883e; stroke-width: 2; marker-end: url(#arrow-orange); }
      .tag { fill: #0d1117; stroke: #30363d; }
      .tag-text { fill: #c9d1d9; font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="420" rx="18"/>
  <text class="title" x="42" y="48">UN-Minecraft-JE-Server-Gateway</text>
  <text class="small" x="42" y="72">Current UNMC Java route: Beijing entry, Los Angeles acceleration, Mac mini-hosted world.</text>

  <rect class="card" x="54" y="156" width="150" height="78" rx="12"/>
  <text class="label" x="129" y="188" text-anchor="middle">Players</text>
  <text class="small" x="129" y="210" text-anchor="middle">Minecraft Java</text>

  <rect class="card" x="268" y="92" width="204" height="76" rx="12"/>
  <text class="label" x="370" y="120" text-anchor="middle">Beijing entry DNS</text>
  <text class="tiny" x="370" y="142" text-anchor="middle">playje.unmcserver.com</text>

  <rect class="card la" x="268" y="232" width="204" height="82" rx="12"/>
  <text class="label" x="370" y="262" text-anchor="middle">Los Angeles entry</text>
  <text class="tiny" x="370" y="284" text-anchor="middle">la.playje.unmcserver.com</text>
  <text class="tiny" x="370" y="302" text-anchor="middle">accelerator VPS</text>

  <rect class="card bj" x="546" y="146" width="214" height="96" rx="14"/>
  <text class="label" x="653" y="178" text-anchor="middle">Beijing relay</text>
  <text class="tiny" x="653" y="200" text-anchor="middle">public Minecraft TCP</text>
  <text class="tiny" x="653" y="218" text-anchor="middle">OpenSSH remote forward</text>

  <rect class="card mac" x="842" y="118" width="260" height="152" rx="16"/>
  <text class="label" x="972" y="150" text-anchor="middle">Mac mini</text>
  <text class="tiny" x="972" y="174" text-anchor="middle">Minecraft JE server jar</text>
  <text class="tiny" x="972" y="194" text-anchor="middle">Local web panel on 127.0.0.1</text>
  <text class="tiny" x="972" y="214" text-anchor="middle">Automatic local world backups</text>
  <text class="tiny" x="972" y="234" text-anchor="middle">SSH tunnel client runs outbound</text>

  <path class="line" d="M204 186 C234 150 238 132 268 130"/>
  <path class="la-line" d="M204 204 C236 236 238 272 268 274"/>
  <path class="line" d="M472 130 C512 130 510 194 546 194"/>
  <path class="la-line" d="M472 274 C512 274 510 194 546 194"/>
  <path class="line" d="M760 194 C792 194 810 194 842 194"/>

  <rect class="tag" x="780" y="166" width="52" height="24" rx="12"/>
  <text class="tag-text" x="806" y="182" text-anchor="middle">SSH -R</text>

  <rect class="tag" x="406" y="342" width="388" height="30" rx="15"/>
  <text class="tag-text" x="600" y="362" text-anchor="middle">LA accelerates the route to Beijing; it does not host a second world.</text>
</svg>
