<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="workflow diagram">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 L3,4 z" fill="#2d5f9a" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f5f7f6"/>
  <g font-family="Arial, 'Helvetica Neue', sans-serif" fill="#17201b">
    <rect x="40" y="40" width="220" height="90" rx="12" fill="#ffffff" stroke="#d8e0dc"/>
    <text x="150" y="72" text-anchor="middle" font-size="18" font-weight="700">玩家客户端</text>
    <text x="150" y="92" text-anchor="middle" font-size="13" fill="#637169">playje / la.playje</text>

    <rect x="430" y="40" width="250" height="90" rx="12" fill="#ffffff" stroke="#d8e0dc"/>
    <text x="555" y="72" text-anchor="middle" font-size="18" font-weight="700">洛杉矶入口</text>
    <text x="555" y="92" text-anchor="middle" font-size="13" fill="#637169">可选转发层</text>

    <rect x="760" y="40" width="260" height="90" rx="12" fill="#ffffff" stroke="#d8e0dc"/>
    <text x="890" y="72" text-anchor="middle" font-size="18" font-weight="700">北京入口</text>
    <text x="890" y="92" text-anchor="middle" font-size="13" fill="#637169">公网 43027 / SSH 反向隧道</text>

    <rect x="760" y="240" width="260" height="90" rx="12" fill="#ffffff" stroke="#d8e0dc"/>
    <text x="890" y="272" text-anchor="middle" font-size="18" font-weight="700">Mac mini（本机）</text>
    <text x="890" y="292" text-anchor="middle" font-size="13" fill="#637169">Tunnel + JE + Panel</text>

    <rect x="430" y="240" width="250" height="90" rx="12" fill="#ffffff" stroke="#d8e0dc"/>
    <text x="555" y="272" text-anchor="middle" font-size="18" font-weight="700">start-all.sh</text>
    <text x="555" y="292" text-anchor="middle" font-size="13" fill="#637169">screen 编排：JE / Tunnel / Panel</text>

    <rect x="40" y="240" width="220" height="90" rx="12" fill="#ffffff" stroke="#d8e0dc"/>
    <text x="150" y="272" text-anchor="middle" font-size="18" font-weight="700">本地面板</text>
    <text x="150" y="292" text-anchor="middle" font-size="13" fill="#637169">127.0.0.1:8765</text>

    <rect x="40" y="420" width="220" height="80" rx="12" fill="#ffffff" stroke="#d8e0dc"/>
    <text x="150" y="452" text-anchor="middle" font-size="18" font-weight="700">JE 进程</text>
    <text x="150" y="472" text-anchor="middle" font-size="13" fill="#637169">minecraft server.jar</text>

    <line x1="260" y1="85" x2="430" y2="85" stroke="#2d5f9a" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="680" y1="85" x2="760" y2="85" stroke="#2d5f9a" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M890 130 C890 170 890 170 890 240" fill="none" stroke="#2d5f9a" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M430 285 C320 285 320 285 240 85" fill="none" stroke="#2d5f9a" stroke-width="3" stroke-dasharray="8 7"/>
    <path d="M890 285 C720 285 720 285 680 285" fill="none" stroke="#9a5a12" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M555 330 C555 380 555 380 550 420" fill="none" stroke="#9a5a12" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M150 330 C150 380 300 380 430 380" fill="none" stroke="#16784d" stroke-width="3" marker-end="url(#arrow)"/>

    <text x="555" y="175" text-anchor="middle" fill="#637169" font-size="13">玩家主链路</text>
    <text x="890" y="210" text-anchor="middle" fill="#637169" font-size="13">SSH -R 反向隧道</text>
    <text x="555" y="315" text-anchor="middle" fill="#637169" font-size="13">面板 -> 控制与监控</text>
