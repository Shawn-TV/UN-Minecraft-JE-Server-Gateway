# Optional regional relay example.
# Put this on a regional VPS if you want players in another region to connect
# to regional.example.com:25565 and be proxied to your primary relay.
#
# Requires nginx built with the stream module.

stream {
    upstream minecraft_primary_relay {
        server play.example.com:25565;
    }

    server {
        listen 25565;
        proxy_pass minecraft_primary_relay;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
    }
}
