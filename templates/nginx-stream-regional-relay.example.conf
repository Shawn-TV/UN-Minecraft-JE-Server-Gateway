# Optional acceleration server example.
# This accelerator can be in any useful region; it does not have to be LA.
# UNMC currently uses this pattern for the Los Angeles entry because that
# server has a premium/dedicated route toward mainland China:
# la.playje.unmcserver.com -> Los Angeles accelerator -> Beijing relay.
# Put this on an accelerator VPS if you want players in another region to connect
# to acceleration.yourdomain.com:25565 and be proxied to your main relay.
#
# Requires nginx built with the stream module.

stream {
    upstream minecraft_primary_relay {
        server play.yourdomain.com:25565;
    }

    server {
        listen 25565;
        proxy_pass minecraft_primary_relay;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
    }
}
