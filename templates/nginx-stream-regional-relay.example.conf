# Optional accelerator relay example.
# UNMC uses this pattern for the Los Angeles entry:
# la.playje.unmcserver.com -> Los Angeles accelerator -> Beijing relay.
# Put this on an accelerator VPS if you want players in another region to connect
# to la.play.yourdomain.com:25565 and be proxied to your main relay.
#
# Requires nginx built with the stream module.

stream {
    upstream minecraft_primary_relay {
        server play.yourdomain.com:25565;
    }

    server {
        listen 25565;
        proxy_pass minecraft_primary_relay;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
    }
}
